<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cardápio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- PERFIL DA LOJA (topo) -->
  <div id="perfil-loja">
    <div id="perfil-banner">
      <img id="perfil-banner-img" src="" alt="" />
      <div id="perfil-banner-overlay"></div>
    </div>
    <div id="perfil-info">
      <img id="perfil-logo" src="img/logo.png" alt="Logo" />
      <h1 id="perfil-nome">Carregando...</h1>
      <div id="perfil-status"></div>
      <div id="perfil-meta"></div>
      <button id="perfil-btn-info" onclick="abrirInfoLoja()">ⓘ Informações</button>
    </div>
  </div>

  <!-- HEADER COMPACTO (aparece no scroll) -->
  <header id="header" class="header-oculto">
    <img id="header-logo" src="img/logo.png" alt="Logo" />
    <span id="header-nome">Carregando...</span>
    <div id="header-acoes">
      <button id="btn-busca" onclick="toggleBusca()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button id="btn-compartilhar" onclick="compartilhar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>
  </header>

  <!-- BUSCA EXPANSÍVEL -->
  <div id="busca-wrapper">
    <div id="busca-container">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="busca-input" placeholder="O que você quer comer hoje?" />
      <button id="busca-limpar" onclick="fecharBusca()">✕</button>
    </div>
  </div>

  <!-- BANNER FECHADO -->
  <div id="banner-fechado" class="hidden">
    <span>🔒</span>
    <div>
      <strong>Restaurante fechado no momento</strong>
      <p id="banner-horario-texto"></p>
    </div>
  </div>

  <!-- MODAL INFORMAÇÕES DA LOJA -->
  <div id="info-overlay" class="hidden" onclick="fecharInfoLoja(event)">
    <div id="info-painel">
      <div id="info-header">
        <h3>Informações</h3>
        <button onclick="fecharInfoLoja()">✕</button>
      </div>
      <div id="info-conteudo"></div>
    </div>
  </div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div id="conteudo-principal">

    <!-- Nav categorias -->
    <nav id="categorias-nav">
      <div id="categorias-lista"></div>
    </nav>

    <!-- Resultados busca -->
    <div id="busca-resultados" class="hidden">
      <p id="busca-label"></p>
      <div id="busca-resultados-lista"></div>
    </div>

    <!-- Seção ofertas -->
    <section id="secao-ofertas" class="hidden">
      <div class="secao-header">
        <span class="secao-tag">🔥 Promoções</span>
      </div>
      <div id="ofertas-carrossel"></div>
    </section>

    <!-- Seções por categoria -->
    <div id="secoes-categorias"></div>

  </div>

  <!-- Botão flutuante carrinho -->
  <button id="btn-carrinho" onclick="abrirCarrinho()" style="display:none">
    <span>🛒</span>
    <span id="carrinho-qtd-badge">0</span>
    <span id="carrinho-total">R$ 0,00</span>
  </button>

  <!-- Modal produto -->
  <div id="modal-overlay" class="hidden" onclick="fecharModal(event)">
    <div id="modal">
      <button id="modal-fechar" onclick="fecharModal()">✕</button>
      <img id="modal-imagem" src="" alt="" />
      <div id="modal-corpo">
        <h2 id="modal-nome"></h2>
        <p id="modal-descricao"></p>
        <p id="modal-preco"></p>
        <div id="modal-adicionais"></div>
        <label for="modal-obs">Observação</label>
        <textarea id="modal-obs" placeholder="Ex: sem cebola, ponto da carne..."></textarea>
        <div id="modal-quantidade">
          <button onclick="mudarQtd(-1)">−</button>
          <span id="qtd-valor">1</span>
          <button onclick="mudarQtd(1)">+</button>
        </div>
        <button id="btn-adicionar">Adicionar ao carrinho</button>
      </div>
    </div>
  </div>

  <!-- Painel carrinho -->
  <div id="carrinho-overlay" class="hidden" onclick="fecharCarrinho(event)">
    <div id="carrinho-painel">
      <button id="carrinho-fechar" onclick="fecharCarrinho()">✕</button>
      <h2>Seu pedido</h2>
      <div id="carrinho-itens"></div>
      <div id="carrinho-checkout">
        <input type="text" id="cliente-nome" placeholder="Seu nome" />
        <input type="tel" id="cliente-whatsapp" placeholder="Seu WhatsApp (com DDD)" />
        <input type="text" id="cliente-endereco" placeholder="Seu endereço completo" />
        <select id="cliente-regiao">
          <option value="">Selecione sua região</option>
        </select>
        <p id="frete-info"></p>
        <p id="total-final"></p>
        <button id="btn-finalizar" onclick="finalizarPedido()">Finalizar pelo WhatsApp</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/cardapio.js"></script>
  <script type="module" src="js/modal.js"></script>
  <script type="module" src="js/carrinho.js"></script>
  <script type="module" src="js/checkout.js"></script>
</body>
</html>
